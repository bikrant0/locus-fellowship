<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Calculator</h1>
    <div class="calculator">
        <input type="text" id="display" class="display" readonly>
        <br>
        <div class="">
            <button onclick="Click(7)">7</button>
            <button onclick="Click(8)">8</button>
            <button onclick="Click(9)">9</button>
            <button class="func" onclick="setOperator('+')">+</button>

            <button onclick="Click(4)">4</button>
            <button onclick="Click(5)">5</button>
            <button onclick="Click(6)">6</button>
            <button onclick="setOperator('-')" class="func">-</button>

            <button onclick="Click(1)">1</button>
            <button onclick="Click(2)">2</button>
            <button onclick="Click(3)">3</button>
            <button class="func" onclick="setOperator('*')">*</button>

            <button class="func" onclick="clearDisplay()">AC</button>
            <button onclick="Click(0)">0</button>
            <button onclick="Click('00')">00</button>
            <button class="func" onclick="Click('0')">=</button>
        </div>






    </div>

</body>
<script>
    function add(a, b) {
        return a + b;
    }

    function multiply(a, b) {
        return a * b;

    }

    function subtract(a, b) {
        return a - b;
    }

    function divide(a, b) {
        if (b === 0) {
            return "Error: Cannot divide by zero";
        }
        return a / b;
    }

    function Click(value) {
        if (calculationDone) {
            display.value = "";
            calculationDone = false;
        }

        display.value += value;
    }

    const display = document.getElementById("display");

    function clearDisplay() {
        display.value = "";
    }

    function setOperator(op) {
        firstNumber = display.value;
        operator = op;
        display.value = "";
    }


</script>

</html>
